name: prayagraj_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.2.3
  razorpay_flutter: ^1.3.6
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  url_launcher: ^6.3.2
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#228B22"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true